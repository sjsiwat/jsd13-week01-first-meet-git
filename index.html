<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫のグループ</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <!-- เนโกะโนะ กุรุปปุ (Neko no Guruppu) - "Cat Gang" in Japanese.  -->

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Verdana, Arial, sans-serif;
      background: url("https://images7.alphacoders.com/131/thumb-1920-1311446.png") center center / cover no-repeat fixed;
        color: #f4f0f0;
      padding: 40px 20px;
    }

    header {
      display: table;
      margin: 0 auto 40px;
      padding: 14px 28px;
      border-radius: 24px;
      position: relative;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2px;
      background: linear-gradient(
        60deg,
        rgba(255, 255, 255, 0.5),
        rgba(255, 255, 255, 0.1),
        rgba(200, 220, 255, 0.6),
        rgba(255, 255, 255, 0.1),
        rgba(255, 255, 255, 0.5)
      );
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: liquidBorder 4s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes liquidBorder {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header h1 {
      font-size: 2.6rem;
      margin: 0;
      font-family: "Caveat", cursive;
      color: #0a1a4a;
      text-shadow:
        0 0 8px rgba(30, 80, 255, 0.7),
        0 0 16px rgba(30, 80, 255, 0.5),
        0 0 32px rgba(30, 80, 255, 0.3);
    }

    header h2 {
      font-size: 1.8rem;
      margin: 4px 0;
      font-family: "Caveat", cursive;
      color: #0a1a4a;
      text-shadow:
        0 0 8px rgba(30, 80, 255, 0.7),
        0 0 16px rgba(30, 80, 255, 0.5),
        0 0 32px rgba(30, 80, 255, 0.3);
    }

    header h3 {
      font-size: 1.5rem;
      margin: 4px 0;
      font-family: "Caveat", cursive;
      color: #0a1a4a;
      text-shadow:
        0 0 6px rgba(30, 80, 255, 0.6),
        0 0 12px rgba(30, 80, 255, 0.3);
    }

    header div {
      margin: 4px 0 0;
      font-family: "Caveat", cursive;
      font-size: 1.4rem;
      color: #0a1a4a;
      text-shadow:
        0 0 6px rgba(30, 80, 255, 0.6),
        0 0 12px rgba(30, 80, 255, 0.3);
    }

    header code {
      background: rgba(10, 26, 74, 0.12);
      padding: 2px 8px;
      border-radius: 6px;
      color: #1a3a8a;
      font-family: "Courier New", monospace;
      text-shadow: none;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .cat-card {
      background: rgba(20, 20, 30, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cat-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45);
    }

    .cat-card .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .cat-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cat-card h2 {
      margin: 12px 0 4px;
      text-transform: capitalize;
      font-size: 1.3rem;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
    }

    .cat-card .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 224, 236, 0.9);
      color: #c14b7c;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .cat-card p {
      margin: 6px 0;
      font-size: 0.9rem;
      color: #f0f0f0;
    }

    .cat-card p span {
      font-weight: bold;
      color: #ffffff;
    }

    section.data-view {
      margin-top: 50px;
      background: rgba(20, 20, 30, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }

    section.data-view h2 {
      margin-top: 0;
    }

    section.data-view ol {
      columns: 2;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #f0f0f0;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header align="center">
    <h1>🐱  猫の仲間  🐱</h1> <br>
    <h2>My Cat Family</h2> <br>
    <h3>meoww ~ </h3>

    <div> Meet the crew, rendered live from <code>my-array.js</code> and <code>my-object.js</code> </div>

  </header>

  <main>
    <div class="cat-grid" id="catGrid">
      <!-- Cat cards are generated here by JavaScript -->
    </div>

    <section class="data-view">
      <h2>Raw Data</h2>
      <h3>From my-array.js</h3>
      <ol id="arrayList"></ol>

      <h3>From my-object.js</h3>
      <ol id="objectList"></ol>
    </section>
  </main>

  <footer>
    <p>Made with HTML, CSS &amp; For learning about web development ✨</p> <br>
    <p> Hooman cant live with out cat</p>
  </footer>

  <script src="my-array.js"></script>
  <script src="my-object.js"></script>
  <script>
    const catGrid = document.getElementById("catGrid");
    const cats = Object.values(mycatgang);

    cats.forEach((cat, index) => {
      const card = document.createElement("div");
      card.className = "cat-card";

      // Real cat photo pulled live from the cataas.com public cat-photo API
      const photoUrl = `https://cataas.com/cat/says/${encodeURIComponent(cat.name)}?width=400&height=400&fontSize=40&fontColor=white`;

      card.innerHTML = `
        <div class="photo-wrap">
          <img src="${photoUrl}" alt="A realistic photo of ${cat.name} the cat" loading="lazy">
        </div>
        <h2>${cat.name}</h2>
        <span class="badge">${mycat[index]}</span>
        <p>Color: <span>${cat.color}</span></p>
        <p>Size: <span>${cat.size}</span></p>
      `;

      catGrid.appendChild(card);
    });

    const arrayList = document.getElementById("arrayList");
    mycat.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      arrayList.appendChild(li);
    });

    const objectList = document.getElementById("objectList");
    Object.entries(mycatgang).forEach(([key, cat]) => {
      const li = document.createElement("li");
      li.textContent = `${key}: ${cat.name} (${cat.color}, ${cat.size})`;
      objectList.appendChild(li);
    });
  </script>

</body>
</html>
